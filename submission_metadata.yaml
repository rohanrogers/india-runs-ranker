  pre_computation_required: true
  pre_computation_time_minutes: 90

# AI tools declaration
ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Used Claude and Gemini for architecture discussion, code review, and debugging
  during development. No candidate data was sent to any external LLM. The ranking
  pipeline runs entirely offline using a local sentence-transformer model with zero
  API calls. All engineering decisions (scoring weights, honeypot detection patterns,
  behavioral signal integration) were made through manual data inspection and
  iterative testing.

# Approach summary
methodology_summary: |
  Two-stage offline compiler architecture. Stage 1 (prep_data.py) runs outside the
  5-minute window: parses 100K candidates, filters by YOE band, detects honeypots
  via 4 signal patterns (date inversion, salary inversion, expert-zero-duration,
  excessive expert count), extracts skill depth scores weighted by JD alignment,
  computes behavioral multipliers from recruiter response rate and recency, and
  batch-encodes profile text using local bge-small-en-v1.5 into 384-dim vectors
  stored as SQLite BLOBs. Stage 2 (rank.py) runs within the 5-minute window:
  loads pre-computed vectors, executes a single NumPy matrix dot-product against
  the JD embedding, applies structural multipliers (company type, location,
  behavioral signals), and outputs a deterministic top-100 CSV in under 2 seconds.

# Declarations
declarations:
