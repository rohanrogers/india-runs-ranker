methodology_summary: |
  We bypassed real-time API latency using an Offline ETL Compiler. We used a local sentence-transformer (bge-small-en) 
  to encode descriptions and mapped exact behavioral signals into a SQLite database. During the 5-minute ranking window, 
  we execute a C-level NumPy dot-product across the BLOBs, enforcing strictly deterministic monotonicity and injecting 
  dynamic, hallucination-free reasoning strings.

